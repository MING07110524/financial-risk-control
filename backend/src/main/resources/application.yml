spring:
  application:
    name: financial-risk-control-backend
  datasource:
    url: ${APP_DB_URL:jdbc:mysql://localhost:3306/financial_risk_control?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${APP_DB_USERNAME:root}
    password: ${APP_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema-v1.sql
      data-locations: classpath:db/seed-v1.sql
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    db:
      enabled: false

app:
  security:
    jwt:
      issuer: financial-risk-control
      expiration-minutes: 120
      secret: change-me-before-enabling-real-authentication-please-use-a-long-secret-value

mybatis:
  configuration:
    map-underscore-to-camel-case: true
