spring:
  datasource:
    url: jdbc:h2:mem:frc_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/test/schema-user-auth.sql
      data-locations: classpath:db/test/seed-user-auth.sql

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  security:
    jwt:
      issuer: financial-risk-control
      expiration-minutes: 120
      secret: change-me-before-enabling-real-authentication-please-use-a-long-secret-value
